name: polymarket-insider-monitor
on:
  schedule:
    # ~каждые 10 минут, НЕ ровно на час (часы пик => задержки)
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch: {}      # ручной запуск кнопкой в Actions
# не запускать новый проход, пока предыдущий не закончил
concurrency:
  group: pm-monitor
  cancel-in-progress: false
permissions:
  contents: write            # нужно для keepalive-коммита
jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      # восстановить state.json из последнего кеша (last_alert + кеш кошельков)
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: pm-state-${{ github.run_id }}
          restore-keys: pm-state-
      - name: Run analyzer (one pass)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_ONCE: '1'
          BIN_SEC: '600'             # держим равным шагу cron (10 мин)
          WATCH_TOP_EVENTS: '60'
          MIN_MARKET_VOL24: '5000'
          REQUIRE_ORDERBOOK: '1'
          MAX_MARKETS: '400'
          ALERT_IFS: '25'            # планка поднята: только сильные сигналы
          PRICE_MAX: '0.70'          # фокус на лонгшотах
          WATCH_SLUGS: ${{ vars.WATCH_SLUGS }}
          # TEST_TELEGRAM: '1'       # разовая проверка доставки
          # DRY_RUN: '1'             # тест без отправки
        run: python polymarket_event_analyzer.py
      # сохранить обновлённый state.json (уникальный ключ на каждый run)
      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: pm-state-${{ github.run_id }}
      # keepalive: раз в неделю пустой коммит, чтобы расписание не отключилось через 60 дней
      - name: Keepalive commit
        if: github.event_name == 'schedule'
        run: |
          if [ "$(date +%u)" = "1" ] && [ "$(date +%H)" = "12" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "keepalive: keep scheduled workflow active"
            git push
          else
            echo "keepalive: не время (только Пн 12:xx UTC)"
          fi
